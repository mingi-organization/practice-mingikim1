          3 * 3 = 9
          3 * 4 = 12
          3 * 5 = 15
          3 * 6 = 18
          3 * 7 = 21
          3 * 8 = 24
          3 * 9 = 27
          4 * 1 = 4
          4 * 2 = 8
          4 * 3 = 12
          4 * 4 = 16
          4 * 5 = 20
          4 * 6 = 24
          4 * 7 = 28
          4 * 8 = 32
          4 * 9 = 36
          5 * 1 = 5
          5 * 2 = 10
          5 * 3 = 15
          5 * 4 = 20
          5 * 5 = 25
          5 * 6 = 30
          5 * 7 = 35
          5 * 8 = 40
          5 * 9 = 45
          6 * 1 = 6
          6 * 2 = 12
          6 * 3 = 18
          6 * 4 = 24
          6 * 5 = 30
          6 * 6 = 36
          6 * 7 = 42
          6 * 8 = 48
          6 * 9 = 54
          7 * 1 = 7
          7 * 2 = 14
          7 * 3 = 21
          7 * 4 = 28
          7 * 5 = 35
          7 * 6 = 42
          7 * 7 = 49
          7 * 8 = 56
          7 * 9 = 63
          8 * 1 = 8
          8 * 2 = 16
          8 * 3 = 24
          8 * 4 = 32
          8 * 5 = 40
          8 * 6 = 48
          8 * 7 = 56
          8 * 8 = 64
          8 * 9 = 72
          9 * 1 = 9
          9 * 2 = 18
          9 * 3 = 27
          9 * 4 = 36
          9 * 5 = 45
          9 * 6 = 54
          9 * 7 = 63
          9 * 8 = 72
          9 * 9 = 81
        comparison-method: contains
        timeout: 10
        max-score: 1
    - name: test4-3-0
      id: test4-3-0
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: test4-3-0
        setup-command: gcc code/4-3.c -o code/4-3.exe
        command: "./code/4-3.exe"
        input: '1

          '
        expected-output: 'false

          '
        comparison-method: contains
        timeout: 10
        max-score: 1
    - name: test4-3-1
      id: test4-3-1
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: test4-3-1
        setup-command: gcc code/4-3.c -o code/4-3.exe
        command: "./code/4-3.exe"
        input: '3

          '
        expected-output: 'true

          '
        comparison-method: contains
        timeout: 10
        max-score: 1
    - name: test4-3-2
      id: test4-3-2
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: test4-3-2
        setup-command: gcc code/4-3.c -o code/4-3.exe
        command: "./code/4-3.exe"
        input: '1221

          '
        expected-output: 'false

          '
        comparison-method: contains
        timeout: 10
        max-score: 1
    - name: test4-3-3
      id: test4-3-3
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: test4-3-3
        setup-command: gcc code/4-3.c -o code/4-3.exe
        command: "./code/4-3.exe"
        input: '7919

          '
        expected-output: 'true

          '
        comparison-method: contains
        timeout: 10
        max-score: 1
    - name: Autograding Reporter
      uses: classroom-resources/autograding-grading-reporter@v1
      env:
        TEST1-1_RESULTS: "${{steps.test1-1.outputs.result}}"
        TEST1-2_RESULTS: "${{steps.test1-2.outputs.result}}"
        TEST1-3_RESULTS: "${{steps.test1-3.outputs.result}}"
        TEST2-1_RESULTS: "${{steps.test2-1.outputs.result}}"
        TEST2-2_RESULTS: "${{steps.test2-2.outputs.result}}"
        TEST2-3_RESULTS: "${{steps.test2-3.outputs.result}}"
        TEST2-4_RESULTS: "${{steps.test2-4.outputs.result}}"
        TEST3-1_RESULTS: "${{steps.test3-1.outputs.result}}"
        TEST3-2_RESULTS: "${{steps.test3-2.outputs.result}}"
        TEST3-3_RESULTS: "${{steps.test3-3.outputs.result}}"
        TEST3-4_RESULTS: "${{steps.test3-4.outputs.result}}"
        TEST4-1-0_RESULTS: "${{steps.test4-1-0.outputs.result}}"
        TEST4-1-1_RESULTS: "${{steps.test4-1-1.outputs.result}}"
        TEST4-1-2_RESULTS: "${{steps.test4-1-2.outputs.result}}"
        TEST4-1-3_RESULTS: "${{steps.test4-1-3.outputs.result}}"
        TEST4-2_RESULTS: "${{steps.test4-2.outputs.result}}"
        TEST4-3-0_RESULTS: "${{steps.test4-3-0.outputs.result}}"
        TEST4-3-1_RESULTS: "${{steps.test4-3-1.outputs.result}}"
        TEST4-3-2_RESULTS: "${{steps.test4-3-2.outputs.result}}"
        TEST4-3-3_RESULTS: "${{steps.test4-3-3.outputs.result}}"
      with:
        runners: test1-1,test1-2,test1-3,test2-1,test2-2,test2-3,test2-4,test3-1,test3-2,test3-3,test3-4,test4-1-0,test4-1-1,test4-1-2,test4-1-3,test4-2,test4-3-0,test4-3-1,test4-3-2,test4-3-3
