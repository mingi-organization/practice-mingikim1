    - name: test3-4
      id: test3-4
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: test3-4
        setup-command: gcc code/3-4.c -o code/3-4.exe
        command: "./code/3-4.exe"
        input: ''
        expected-output: |
          5 5 5
          14 5 5
          15 6 5
        comparison-method: contains
        timeout: 10
        max-score: 1
    - name: test4-1-0
      id: test4-1-0
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: test4-1-0
        setup-command: gcc code/4-1.c -o code/4-1.exe
        command: "./code/4-1.exe"
        input: '1 3 -

          '
        expected-output: "-2\n"
        comparison-method: contains
        timeout: 10
        max-score: 1
    - name: test4-1-1
      id: test4-1-1
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: test4-1-1
        setup-command: gcc code/4-1.c -o code/4-1.exe
        command: "./code/4-1.exe"
        input: '4 2 +

          '
        expected-output: '6

          '
        comparison-method: contains
        timeout: 10
        max-score: 1
    - name: test4-1-2
      id: test4-1-2
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: test4-1-2
        setup-command: gcc code/4-1.c -o code/4-1.exe
        command: "./code/4-1.exe"
        input: '8 10 *

